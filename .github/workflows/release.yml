name: Release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # The safety tests gate the release. If the deny-list test ever fails, the
  # app can log people out, and nothing ships.
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [macos-14, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev

      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

  macos:
    needs: test
    runs-on: macos-14
    # Job-level so the steps below can test it in `if:` — a step cannot read the
    # env block it declares itself, and `secrets` isn't available in `if`.
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      # The certificate lives in a throwaway keychain that dies with the runner.
      - name: Import signing certificate
        if: env.MACOS_CERT_P12 != ''
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          rm -f "$RUNNER_TEMP/cert.p12"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 \
            | sed -E 's/.*"(.*)".*/\1/')"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using identity: $IDENTITY"

      - name: Build, sign, notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./packaging/macos/bundle.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: target/dist/*.dmg
          if-no-files-found: error

  windows:
    needs: test
    runs-on: windows-latest
    env:
      WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      # Signing is wired up but inert until a certificate secret exists, so
      # adding one later needs no changes here.
      - name: Sign executable
        if: env.WINDOWS_CERT_PFX != ''
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
          & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            target\release\discord-desktop-fixer.exe
          Remove-Item $pfx

      - name: Stage artifact
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"').Matches[0].Groups[1].Value
          New-Item -ItemType Directory -Force target\dist | Out-Null
          Copy-Item target\release\discord-desktop-fixer.exe `
            "target\dist\DiscordDesktopFixer-$version-x86_64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: target/dist/*.exe
          if-no-files-found: error

  linux:
    needs: test
    # Oldest supported glibc — binaries built here run on newer distros, but
    # not the other way around.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev \
            libfuse2 desktop-file-utils

      - run: ./packaging/linux/appimage.sh

      - name: Stage raw binary
        run: |
          VERSION="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          cp target/release/discord-desktop-fixer \
            "target/dist/DiscordDesktopFixer-$VERSION-x86_64-linux"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            target/dist/*.AppImage
            target/dist/*-linux
          if-no-files-found: error

  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon & Intel) | `.dmg` — drag to Applications |
            | Windows 10/11 | `.exe` — no installer, just run it |
            | Linux | `.AppImage` — `chmod +x` then double-click |

            Windows shows a SmartScreen warning (**More info → Run anyway**).
            If macOS refuses to open it, see
            [Open Anyway](../blob/main/README.md#if-macos-says-it-cannot-be-opened).

            Open it, click **Fix Discord**, done. **You stay logged in** — the
            app never touches the files that hold your session.

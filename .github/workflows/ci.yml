name: CI

# Runs on every push and PR, so platform-specific breakage surfaces here
# rather than when a release tag is already pushed.
#
# This matters more than usual for this project: large parts of it are behind
# `#[cfg(target_os = ...)]`, so code that compiles cleanly on one platform can
# be dead — or absent — on another. Only a real three-OS build proves it.
on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false # Report every platform's failures in one run, not just the first.
      matrix:
        os: [macos-15, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev

      - name: Format
        # Formatting is platform-independent; checking it three times is noise.
        if: runner.os == 'Linux'
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      # `--all-targets` skips doctests, so run them once on their own.
      - name: Doctests
        if: runner.os == 'Linux'
        run: cargo test --doc
